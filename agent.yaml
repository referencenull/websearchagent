name: WebSearchAgent
description: This Agent can perform web searches and retrieve the latest information from Bing.
metadata:
  example:
    - role: user
      content: |-
        What's the latest news in AI?
  tags:
    - AI Agent Grounding
    - AI Agent Hosting
    - Azure AI AgentServer
    - Bing Grounding
    - Microsoft Agent Framework
  authors:
    - referencenull
template:
  name: WebSearchAgent
  kind: hosted
  protocols:
    - protocol: responses
      version: v1
  environment_variables:
    - name: AZURE_AI_PROJECT_ENDPOINT
      value: $https://agenticwebinar-resource.services.ai.azure.com/api/projects/agenticwebinar
    - name: BING_GROUNDING_CONNECTION_ID
      value: $subscriptions/af27b7c9-0570-46ed-9bb7-49786ebbcbfc/resourceGroups/rg-jukarvon-2081/providers/Microsoft.CognitiveServices/accounts/agenticwebinar-resource/projects/agenticwebinar/connections/searchagentwebinarwx2lzp
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{chat}}"
resources:
  - kind: model
    id: gpt-4o-mini
    name: chat
  - kind: tool
    id: bing_grounding
